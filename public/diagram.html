<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Diagram Hub</title>
  <link rel="icon" type="image/png" href="/icon.png" />
  <link rel="apple-touch-icon" href="/icon.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- Full-height flex layout: toolbar → optional banner → (diagram | comments) row -->
<div class="diagram-page" id="diagram-page">

  <!-- ── Toolbar ──────────────────────────────────────────────────────── -->
  <div class="diagram-toolbar">
    <a href="/" style="flex-shrink:0">
      <button class="btn btn-secondary btn-sm">← Hub</button>
    </a>

    <div class="title-area">
      <div class="diagram-title" id="diagram-title">Loading…</div>
      <div class="diagram-meta"  id="diagram-meta"></div>
    </div>

    <!-- Mode badge: VIEW or EDIT -->
    <span class="mode-badge" id="mode-badge">VIEW</span>
    <span class="app-version" style="font-size:0.7rem; color:var(--color-text-muted); margin-left:0.5rem; align-self:center;">v1.4.2</span>
    <div id="auth-controls" style="display:flex; align-items:center; margin-left:8px; margin-right:8px;"></div>

    <!-- Action buttons -->
    <button id="add-comment-btn"      class="btn btn-secondary btn-sm">+ Comment</button>
    <button id="comments-toggle-btn"  class="btn btn-secondary btn-sm">Comments</button>
    <button id="edit-btn"  class="btn btn-primary  btn-sm">Edit</button>
    <button id="share-btn" class="btn btn-secondary btn-sm">Share</button>
  </div>

  <!-- ── "New changes" banner (hidden until polling detects a newer save) ── -->
  <div class="banner hidden" id="changes-banner">
    <span class="banner-msg" id="banner-msg">New changes available — click to reload.</span>
    <button id="banner-reload" class="btn btn-secondary btn-sm">Reload</button>
    <button id="banner-dismiss" class="btn btn-sm" style="color:var(--color-text-muted)">✕</button>
  </div>

  <!-- ── Body row: diagram (left) + comments sidebar (right) ─────────── -->
  <div class="diagram-body">

    <div class="diagram-main">
      <!-- ── draw.io iframe / viewer wrapper ─────────────────────────── -->
      <div class="iframe-wrapper">
        <div class="loading-overlay" id="loading-overlay">
          <div class="spinner"></div>
        </div>
        <!-- View mode: read-only static viewer (zoom/pan/layers, no editing). -->
        <div id="viewer-container" class="viewer-container hidden"></div>
        <!-- Edit mode: full draw.io editor iframe. -->
        <iframe
          id="drawio-frame"
          class="hidden"
          title="draw.io diagram editor"
          allow="clipboard-read; clipboard-write"
        ></iframe>
        <!-- Transparent overlay that captures pin-placement clicks when
             "Add Comment" mode is armed. Sits above both the viewer and the
             editor iframe, since both render inside this same wrapper. -->
        <div id="comment-click-layer" class="comment-click-layer"></div>
        <!-- Color-coded dot markers for open (unresolved) comment threads. -->
        <div id="comment-dots-layer" class="comment-dots-layer"></div>
      </div>
    </div>

    <!-- ── Comments sidebar ─────────────────────────────────────────── -->
    <aside id="comments-panel" class="comments-panel">
      <div class="comments-panel-header">
        <h3>Comments</h3>
        <label class="comments-show-resolved">
          <input type="checkbox" id="show-resolved-checkbox" /> Show resolved
        </label>
        <button id="comments-panel-collapse" class="btn btn-sm" style="color:var(--color-text-muted)">✕</button>
      </div>
      <div id="comments-list" class="comments-list"></div>
    </aside>

  </div><!-- /.diagram-body -->

</div><!-- /.diagram-page -->

<!-- Passphrase modal (generic — reused for Edit, commenting, and admin resolve) -->
<div class="modal-overlay hidden" id="passphrase-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <h3 id="modal-title">Enter edit passphrase</h3>
    <p id="modal-description">
      Editing requires a shared passphrase. It will be remembered for this
      browser session only.
    </p>
    <input
      id="modal-passphrase"
      type="password"
      placeholder="Passphrase…"
      autocomplete="current-password"
    />
    <span id="modal-error" class="auth-error hidden">Incorrect passphrase.</span>
    <div class="modal-actions">
      <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
      <button id="modal-submit" class="btn btn-primary">Unlock</button>
    </div>
  </div>
</div>

<!-- Comment composer modal (shown when a pin is placed) -->
<div class="modal-overlay hidden" id="comment-composer-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="comment-composer-title">
    <h3 id="comment-composer-title">Add comment</h3>
    <div id="comment-composer-name-row">
      <input
        id="comment-composer-name"
        type="text"
        placeholder="Your name…"
        maxlength="60"
      />
    </div>
    <select id="comment-composer-priority">
      <option value="low">Low priority</option>
      <option value="medium" selected>Medium priority</option>
      <option value="high">High priority</option>
    </select>
    <textarea
      id="comment-composer-body"
      placeholder="Write a comment…"
      rows="4"
      maxlength="4000"
    ></textarea>
    <span id="comment-composer-error" class="auth-error hidden"></span>
    <div class="modal-actions">
      <button id="comment-composer-cancel" class="btn btn-secondary">Cancel</button>
      <button id="comment-composer-submit" class="btn btn-primary">Post Comment</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script src="/app.js"></script>
<script>
  // ── Extract diagram ID from URL path  (/d/:id) ───────────────────────────
  const diagramId = (location.pathname.match(/^\/d\/([A-Za-z0-9]+)/) || [])[1];
  if (!diagramId) {
    document.getElementById('diagram-title').textContent = 'Diagram not found';
    throw new Error('No diagram ID in URL');
  }

  // ── DOM refs ─────────────────────────────────────────────────────────────
  const iframe          = document.getElementById('drawio-frame');
  const viewerContainer = document.getElementById('viewer-container');
  const titleEl         = document.getElementById('diagram-title');
  const metaEl          = document.getElementById('diagram-meta');
  const modeBadge       = document.getElementById('mode-badge');
  const editBtn         = document.getElementById('edit-btn');
  const shareBtn        = document.getElementById('share-btn');
  const changesBanner   = document.getElementById('changes-banner');
  const bannerMsg       = document.getElementById('banner-msg');
  const bannerReload    = document.getElementById('banner-reload');
  const bannerDismiss   = document.getElementById('banner-dismiss');
  const loadingOverlay  = document.getElementById('loading-overlay');

  const passphraseModal   = document.getElementById('passphrase-modal');
  const modalTitle        = document.getElementById('modal-title');
  const modalDescription  = document.getElementById('modal-description');
  const modalPassphrase   = document.getElementById('modal-passphrase');
  const modalError        = document.getElementById('modal-error');
  const modalCancel       = document.getElementById('modal-cancel');
  const modalSubmit       = document.getElementById('modal-submit');

  const addCommentBtn       = document.getElementById('add-comment-btn');
  const commentsToggleBtn   = document.getElementById('comments-toggle-btn');
  const commentsPanel       = document.getElementById('comments-panel');
  const commentsPanelClose  = document.getElementById('comments-panel-collapse');
  const commentsList        = document.getElementById('comments-list');
  const showResolvedCheckbox = document.getElementById('show-resolved-checkbox');
  const commentClickLayer   = document.getElementById('comment-click-layer');
  const commentDotsLayer    = document.getElementById('comment-dots-layer');

  const commentComposerModal    = document.getElementById('comment-composer-modal');
  const commentComposerNameRow  = document.getElementById('comment-composer-name-row');
  const commentComposerName     = document.getElementById('comment-composer-name');
  const commentComposerPriority = document.getElementById('comment-composer-priority');
  const commentComposerBody     = document.getElementById('comment-composer-body');
  const commentComposerError    = document.getElementById('comment-composer-error');
  const commentComposerCancel   = document.getElementById('comment-composer-cancel');
  const commentComposerSubmit   = document.getElementById('comment-composer-submit');

  // ── State ────────────────────────────────────────────────────────────────
  let currentMode  = 'view';      // 'view' | 'edit'
  let lastUpdatedAt = 0;          // used by polling
  let embed        = null;        // DiagramEmbed | DiagramViewer instance
  let stopPolling  = null;        // function to cancel the polling loop
  let metaInterval = null;        // for updating "X min ago" display
  let stopWatchingView = null;    // function to cancel DiagramViewer.watchViewChanges
  let editLoadTimers = null;      // {slow, force} setTimeout handles for the edit-mode loading safety net

  let comments = [];              // cached comment threads for this diagram
  let showResolved = false;
  // On narrow (mobile) screens the comments panel overlays and hides the
  // whole diagram (see the max-width:720px rule in style.css), so default
  // it to closed there so the diagram fills the screen on first load.
  // Desktop keeps its previous default of open, since there it's a sidebar
  // that doesn't cover the canvas.
  let commentsPanelVisible = window.innerWidth > 720;
  commentsPanel.classList.toggle('collapsed', !commentsPanelVisible); // sync initial DOM state to the default above
  let commentModeArmed = false;
  let pendingCommentPoint = null; // {x, y} graph/page coords picked for a new comment

  // ── Initialise in view mode ───────────────────────────────────────────────

  async function initView() {
    currentMode = 'view';
    modeBadge.textContent = 'VIEW';
    modeBadge.classList.remove('edit');
    editBtn.textContent = 'Edit';

    // Fetch meta first (public) to seed the updatedAt timestamp.
    try {
      const metaRes = await fetch(`/api/diagrams/${diagramId}/meta`);
      if (metaRes.ok) {
        const meta = await metaRes.json();
        lastUpdatedAt = meta.updatedAt;
        updateMetaDisplay(meta.updatedAt);
      }
    } catch { /* ignore */ }

    // Load the title from the view endpoint.
    try {
      const res = await fetch(`/api/diagrams/${diagramId}?mode=view`);
      if (res.ok) {
        const data = await res.json();
        titleEl.textContent = data.title;
        document.title = `${data.title} — Diagram Hub`;
      }
    } catch { /* ignore */ }

    destroyEmbed();
    iframe.classList.add('hidden');
    viewerContainer.classList.remove('hidden');
    embed = new DiagramViewer({
      container: viewerContainer,
      diagramId,
      onReady: () => {
        loadingOverlay.classList.add('hidden');
        renderDots();
        stopWatchingView = embed.watchViewChanges(() => renderDots());
      },
    });

    loadingOverlay.classList.remove('hidden');
    try {
      await embed.load();
    } catch (e) {
      showToast(`Could not load diagram: ${e.message}`, 'error');
      loadingOverlay.classList.add('hidden');
    }

    startMetaInterval();
    beginPolling();
  }

  // Resolve which passphrase to use for editing this diagram: prefer a
  // per-diagram passphrase (if one has been entered and cached for this
  // diagram in this browser session), then fall back to the shared/master
  // passphrase cached at the hub level. Returns { passphrase, source } where
  // source is 'diagram' or 'shared', or null if neither is cached.
  function resolveEditPassphrase(id) {
    const diagramPass = getCachedDiagramPassphrase(id);
    if (diagramPass) return { passphrase: diagramPass, source: 'diagram' };
    const sharedPass = getCachedPassphrase();
    if (sharedPass) return { passphrase: sharedPass, source: 'shared' };
    return null;
  }

  async function initEdit(passphrase, source = 'shared') {
    currentMode = 'edit';
    modeBadge.textContent = 'EDIT';
    modeBadge.classList.add('edit');
    editBtn.textContent = 'Switch to View';

    destroyEmbed();
    viewerContainer.classList.add('hidden');
    iframe.classList.remove('hidden');

    // Safety net: the self-hosted draw.io editor bundle can take a while to
    // load (especially on a cold cache, or when it's downloading alongside
    // the View-mode viewer script that was already in flight). Rather than
    // spinning silently with no feedback, let the user know it's still
    // working, and if it's genuinely taking too long, drop our overlay so
    // draw.io's own native loading indicator (spin=1) is visible underneath
    // instead of looking permanently stuck.
    let editReadyFired = false;
    const slowTimer  = setTimeout(() => {
      if (!editReadyFired) showToast('Still loading the editor — first load can take a bit longer.', 'info', 6000);
    }, 8000);
    const forceTimer = setTimeout(() => {
      if (!editReadyFired) loadingOverlay.classList.add('hidden');
    }, 25000);
    editLoadTimers = { slow: slowTimer, force: forceTimer };

    embed = new DiagramEmbed({
      iframe,
      diagramId,
      mode:       'edit',
      passphrase,
      onSaved:    (updatedAt) => {
        lastUpdatedAt = updatedAt;
        updateMetaDisplay(updatedAt);
      },
      onReady:    () => {
        editReadyFired = true;
        clearTimeout(slowTimer);
        clearTimeout(forceTimer);
        editLoadTimers = null;
        loadingOverlay.classList.add('hidden');
        renderDots();
      },
    });

    loadingOverlay.classList.remove('hidden');
    try {
      await embed.load();
      showToast('Edit mode — changes save automatically.', 'success', 2500);
    } catch (e) {
      if (e.message.includes('401')) {
        showToast('Passphrase rejected by server.', 'error');
        // Fall back to view mode and clear only the cache the rejected
        // passphrase actually came from, so a valid credential of the
        // other kind (diagram-specific vs. shared) is left untouched.
        if (source === 'diagram') {
          clearCachedDiagramPassphrase(diagramId);
        } else {
          clearCachedPassphrase();
        }
        await initView();
        return;
      }
      showToast(`Could not load for editing: ${e.message}`, 'error');
      loadingOverlay.classList.add('hidden');
    }

    startMetaInterval();
    beginPolling();
  }

  function destroyEmbed() {
    disarmCommentMode();
    clearHover();
    if (stopWatchingView) { stopWatchingView(); stopWatchingView = null; }
    if (editLoadTimers) { clearTimeout(editLoadTimers.slow); clearTimeout(editLoadTimers.force); editLoadTimers = null; }
    if (embed) { embed.destroy(); embed = null; }
    if (stopPolling) { stopPolling(); stopPolling = null; }
    if (metaInterval) { clearInterval(metaInterval); metaInterval = null; }
    changesBanner.classList.add('hidden');
    commentDotsLayer.innerHTML = '';
  }

  // ── Polling ───────────────────────────────────────────────────────────────

  function beginPolling() {
    if (stopPolling) stopPolling();
    stopPolling = startPolling(diagramId, lastUpdatedAt, (newUpdatedAt) => {
      // Only surface the banner if we're in view mode, or if we're in edit mode
      // and a DIFFERENT session saved (someone else).
      // In edit mode, our own saves update lastUpdatedAt immediately via onSaved,
      // so polling will only fire if the remote value is genuinely newer than
      // what we last saved — meaning another editor is present.
      lastUpdatedAt = newUpdatedAt;
      showChangesBanner(newUpdatedAt);
    });
  }

  function showChangesBanner(updatedAt) {
    bannerMsg.textContent =
      `New changes available (saved ${relativeTime(updatedAt)}) — click to reload.`;
    changesBanner.classList.remove('hidden');
  }

  bannerReload.addEventListener('click', async () => {
    changesBanner.classList.add('hidden');
    if (currentMode === 'view') {
      if (embed) {
        loadingOverlay.classList.remove('hidden');
        await embed.refresh();
        loadingOverlay.classList.add('hidden');
        renderDots();
      }
    } else {
      // In edit mode: warn that unsaved edits may be overwritten by a reload.
      if (confirm('Reload diagram from server? Any unsaved local changes will be lost.')) {
        if (embed) {
          loadingOverlay.classList.remove('hidden');
          await embed.refresh();
          loadingOverlay.classList.add('hidden');
          renderDots();
        }
      }
    }
  });

  bannerDismiss.addEventListener('click', () => {
    changesBanner.classList.add('hidden');
  });

  // ── Meta display ("Updated X ago") ───────────────────────────────────────

  function updateMetaDisplay(updatedAt) {
    metaEl.textContent = updatedAt ? `Updated ${relativeTime(updatedAt)}` : '';
  }

  function startMetaInterval() {
    if (metaInterval) clearInterval(metaInterval);
    metaInterval = setInterval(() => {
      if (lastUpdatedAt) updateMetaDisplay(lastUpdatedAt);
    }, 30_000); // refresh relative string every 30s
  }

  // ── Edit button ───────────────────────────────────────────────────────────

  editBtn.addEventListener('click', async () => {
    if (currentMode === 'edit') {
      // Switch back to view mode.
      await initView();
      return;
    }

    const hasSsoEditAccess = currentUser && (currentUser.role === 'admin' || currentUser.role === 'editor');
    if (hasSsoEditAccess) {
      await initEdit('', 'sso');
      return;
    }

    const resolved = resolveEditPassphrase(diagramId);
    if (resolved) {
      await initEdit(resolved.passphrase, resolved.source);
    } else {
      openPassphraseModal({
        title: 'Enter edit passphrase',
        description: 'Editing requires a shared passphrase. It will be remembered for this browser session only.',
        onSubmit: async (passphrase) => {
          await verifyDiagramPassphrase(passphrase);
          setCachedDiagramPassphrase(diagramId, passphrase);
          await initEdit(passphrase, 'diagram');
        },
      });
    }
  });

  // ── Share button ──────────────────────────────────────────────────────────

  shareBtn.addEventListener('click', () => {
    const url = `${location.origin}/d/${diagramId}`;
    navigator.clipboard.writeText(url)
      .then(() => showToast('Share link copied to clipboard', 'success'))
      .catch(() => showToast(`Share URL: ${url}`, 'info', 6000));
  });

  // ── Generic passphrase modal ─────────────────────────────────────────────
  //
  // Reused for three flows, each supplying its own title/description and an
  // onSubmit(passphrase) callback that must either resolve (success — the
  // modal closes) or throw an Error. Throw an Error with `.unauthorized =
  // true` to show the inline "Incorrect passphrase" state and let the user
  // retry; any other thrown Error is surfaced as a toast and the modal stays
  // open with the passphrase field cleared for a retry.
  //   1. Edit button        → validates against the diagram passphrase gate.
  //   2. Commenting/replies → same diagram passphrase gate.
  //   3. Admin resolve      → validates against the MASTER-only gate.

  let passphraseModalOnSubmit = null;

  function openPassphraseModal({ title, description, onSubmit }) {
    modalTitle.textContent = title;
    modalDescription.textContent = description;
    passphraseModalOnSubmit = onSubmit;
    passphraseModal.classList.remove('hidden');
    modalPassphrase.value = '';
    modalError.classList.add('hidden');
    setTimeout(() => modalPassphrase.focus(), 50);
  }

  function closePassphraseModal() {
    passphraseModal.classList.add('hidden');
    modalPassphrase.value = '';
    modalError.classList.add('hidden');
    passphraseModalOnSubmit = null;
  }

  modalCancel.addEventListener('click', closePassphraseModal);
  passphraseModal.addEventListener('click', (e) => {
    // Close on backdrop click.
    if (e.target === passphraseModal) closePassphraseModal();
  });

  async function submitPassphrase() {
    const passphrase = modalPassphrase.value;
    if (!passphrase || !passphraseModalOnSubmit) return;

    modalSubmit.disabled = true;
    modalError.classList.add('hidden');
    try {
      await passphraseModalOnSubmit(passphrase);
      closePassphraseModal();
    } catch (e) {
      if (e && e.unauthorized) {
        modalError.textContent = e.message || 'Incorrect passphrase.';
        modalError.classList.remove('hidden');
        modalPassphrase.select();
      } else {
        showToast(`Network error: ${e.message}`, 'error');
      }
    } finally {
      modalSubmit.disabled = false;
    }
  }

  modalSubmit.addEventListener('click', submitPassphrase);
  modalPassphrase.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitPassphrase();
    if (e.key === 'Escape') closePassphraseModal();
  });

  /** Validate a candidate passphrase against the diagram's edit gate
   *  (shared/master OR this diagram's own passphrase). Throws an
   *  `.unauthorized` Error on rejection. */
  async function verifyDiagramPassphrase(passphrase) {
    const res = await fetch(`/api/diagrams/${diagramId}?mode=edit`, {
      headers: { 'X-Edit-Passphrase': passphrase },
    });
    if (res.status === 401) {
      const err = new Error('Incorrect passphrase.');
      err.unauthorized = true;
      throw err;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  }

  /** Validate a candidate passphrase against the MASTER-only admin gate
   *  (used for resolving/reopening comment threads). Throws an
   *  `.unauthorized` Error on rejection. */
  async function verifyMasterPassphrase(passphrase) {
    const res = await fetch('/api/diagrams', {
      headers: { 'X-Edit-Passphrase': passphrase },
    });
    if (res.status === 401) {
      const err = new Error('Incorrect passphrase.');
      err.unauthorized = true;
      throw err;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  }

  /** Run `action(passphrase)` using a cached diagram/shared passphrase if
   *  available; otherwise prompt for one, validate it, cache it, then run. */
  function withEditPermission(action) {
    const resolved = resolveEditPassphrase(diagramId);
    if (resolved) { action(resolved.passphrase); return; }
    openPassphraseModal({
      title: 'Enter passphrase',
      description: 'This action requires the shared or diagram passphrase. It will be remembered for this browser session only.',
      onSubmit: async (passphrase) => {
        await verifyDiagramPassphrase(passphrase);
        setCachedDiagramPassphrase(diagramId, passphrase);
        action(passphrase);
      },
    });
  }

  /** Run `action(passphrase)` using the cached MASTER/shared passphrase if
   *  available; otherwise prompt for it specifically (a diagram-only
   *  passphrase is NOT accepted for admin actions like resolving). */
  function withAdminPermission(action) {
    const master = getCachedPassphrase();
    if (master) { action(master); return; }
    openPassphraseModal({
      title: 'Enter admin passphrase',
      description: 'Resolving or reopening a comment thread requires the shared/master passphrase.',
      onSubmit: async (passphrase) => {
        await verifyMasterPassphrase(passphrase);
        setCachedPassphrase(passphrase);
        action(passphrase);
      },
    });
  }

  function isAuthError(e) {
    return !!e && typeof e.message === 'string' && /passphrase/i.test(e.message);
  }

  // ── Comments: data + rendering ──────────────────────────────────────────

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  async function loadComments() {
    try {
      comments = await apiListComments(diagramId);
    } catch (e) {
      showToast(`Could not load comments: ${e.message}`, 'error');
      comments = [];
    }
    renderComments();
    renderDots();
  }

  function applyCommentUpdate(updated) {
    const idx = comments.findIndex((c) => c.id === updated.id);
    if (idx >= 0) comments[idx] = updated;
    else comments.push(updated);
  }

  function renderCommentCard(c, cachedName) {
    const repliesHtml = c.replies.map((r) => `
      <div class="comment-reply">
        <div class="comment-author">${escapeHtml(r.authorName)} <span class="comment-time">${relativeTime(r.createdAt)}</span></div>
        <div class="comment-text">${escapeHtml(r.body)}</div>
      </div>
    `).join('');

    const hasName = (currentUser && currentUser.name) || cachedName;
    const nameFieldHtml = hasName
      ? ''
      : `<input type="text" class="reply-name-input" placeholder="Your name…" maxlength="60" />`;

    const isResolved = c.status === 'resolved';

    return `
      <div class="comment-thread ${isResolved ? 'resolved' : ''}" data-comment-id="${c.id}">
        <div class="comment-thread-header">
          <span class="priority-dot priority-${c.priority}"></span>
          <select class="priority-select" title="Change priority">
            <option value="low"    ${c.priority === 'low'    ? 'selected' : ''}>Low</option>
            <option value="medium" ${c.priority === 'medium' ? 'selected' : ''}>Medium</option>
            <option value="high"   ${c.priority === 'high'   ? 'selected' : ''}>High</option>
          </select>
          <span class="comment-status-badge ${c.status}">${isResolved ? 'Resolved' : 'Open'}</span>
        </div>
        <div class="comment-body">
          <div class="comment-author">${escapeHtml(c.authorName)} <span class="comment-time">${relativeTime(c.createdAt)}</span></div>
          <div class="comment-text">${escapeHtml(c.body)}</div>
        </div>
        ${c.replies.length ? `<div class="comment-replies">${repliesHtml}</div>` : ''}
        <div class="comment-reply-form">
          ${nameFieldHtml}
          <textarea class="reply-body-input" rows="2" placeholder="Reply…" maxlength="4000"></textarea>
          <button class="btn btn-secondary btn-sm reply-submit-btn">Reply</button>
        </div>
        <div class="comment-thread-actions">
          <button class="btn btn-secondary btn-sm delete-comment-btn">Delete</button>
          <button class="btn ${isResolved ? 'btn-secondary' : 'btn-primary'} btn-sm resolve-toggle-btn">
            ${isResolved ? 'Reopen' : 'Resolve'}
          </button>
        </div>
        <div class="comment-delete-confirm hidden" style="margin-top: 10px; padding: 8px; background: var(--color-warning-bg); border: 1px solid var(--color-warning-bd); border-radius: 4px; display: flex; align-items: center; justify-content: space-between; gap: 10px;">
          <span style="font-size: 12px; color: var(--color-text); font-weight: 500;">Delete this thread?</span>
          <div style="display: flex; gap: 6px;">
            <button class="btn btn-danger btn-sm confirm-delete-yes-btn" style="padding: 2px 8px; font-size: 11px;">Yes</button>
            <button class="btn btn-secondary btn-sm confirm-delete-cancel-btn" style="padding: 2px 8px; font-size: 11px;">Cancel</button>
          </div>
        </div>
      </div>
    `;
  }

  function renderComments() {
    const cachedName = getCachedCommenterName();
    const visible = comments
      .filter((c) => showResolved || c.status !== 'resolved')
      .slice()
      .sort((a, b) => b.createdAt - a.createdAt);

    if (visible.length === 0) {
      commentsList.innerHTML = '<div class="comments-empty text-muted">No comments yet. Click "+ Comment" and click a point on the diagram.</div>';
      return;
    }
    commentsList.innerHTML = visible.map((c) => renderCommentCard(c, cachedName)).join('');
  }

  commentsList.addEventListener('click', (evt) => {
    const replyBtn = evt.target.closest('.reply-submit-btn');
    if (replyBtn) {
      const card = replyBtn.closest('.comment-thread');
      submitReply(card.dataset.commentId, card);
      return;
    }
    const resolveBtn = evt.target.closest('.resolve-toggle-btn');
    if (resolveBtn) {
      const card = resolveBtn.closest('.comment-thread');
      const commentId = card.dataset.commentId;
      const comment = comments.find((c) => c.id === commentId);
      if (!comment) return;
      const wantResolved = comment.status !== 'resolved';
      withAdminPermission((passphrase) => attemptResolve(commentId, wantResolved, passphrase));
      return;
    }
    const deleteBtn = evt.target.closest('.delete-comment-btn');
    if (deleteBtn) {
      const card = deleteBtn.closest('.comment-thread');
      card.querySelector('.comment-thread-actions').classList.add('hidden');
      card.querySelector('.comment-delete-confirm').classList.remove('hidden');
      return;
    }
    const cancelDeleteBtn = evt.target.closest('.confirm-delete-cancel-btn');
    if (cancelDeleteBtn) {
      const card = cancelDeleteBtn.closest('.comment-thread');
      card.querySelector('.comment-thread-actions').classList.remove('hidden');
      card.querySelector('.comment-delete-confirm').classList.add('hidden');
      return;
    }
    const yesDeleteBtn = evt.target.closest('.confirm-delete-yes-btn');
    if (yesDeleteBtn) {
      const card = yesDeleteBtn.closest('.comment-thread');
      const commentId = card.dataset.commentId;
      const comment = comments.find((c) => c.id === commentId);
      const isAuthor = comment && currentUser && comment.authorId === currentUser.author_id;

      if (isAuthor) {
        attemptDeleteComment(commentId, '');
      } else {
        withAdminPermission((passphrase) => attemptDeleteComment(commentId, passphrase));
      }
      return;
    }
  });

  commentsList.addEventListener('change', (evt) => {
    const select = evt.target.closest('.priority-select');
    if (!select) return;
    const card = select.closest('.comment-thread');
    changePriority(card.dataset.commentId, select.value);
  });

  function submitReply(commentId, card) {
    const bodyInput = card.querySelector('.reply-body-input');
    const body = bodyInput.value.trim();
    if (!body) { showToast('Reply text is required.', 'error'); return; }

    let authorName = '';
    if (currentUser && currentUser.name) {
      authorName = currentUser.name;
    } else {
      const cachedName = getCachedCommenterName();
      authorName = cachedName;
      if (!authorName) {
        const nameInput = card.querySelector('.reply-name-input');
        authorName = nameInput ? nameInput.value.trim() : '';
        if (!authorName) { showToast('Name is required.', 'error'); return; }
      }
    }

    (async () => {
      try {
        const resolved = resolveEditPassphrase(diagramId);
        const passphrase = resolved ? resolved.passphrase : '';
        const updated = await apiReplyComment(diagramId, commentId, { authorName, body }, passphrase);
        if (!currentUser || !currentUser.name) {
          const cachedName = getCachedCommenterName();
          if (!cachedName) setCachedCommenterName(authorName);
        }
        applyCommentUpdate(updated);
        renderComments();
        showToast('Reply posted.', 'success');
      } catch (e) {
        showToast(`Could not post reply: ${e.message}`, 'error');
      }
    })();
  }

  function changePriority(commentId, newPriority) {
    (async () => {
      try {
        const resolved = resolveEditPassphrase(diagramId);
        const passphrase = resolved ? resolved.passphrase : '';
        const updated = await apiUpdateCommentPriority(diagramId, commentId, newPriority, passphrase);
        applyCommentUpdate(updated);
        renderComments();
        renderDots();
      } catch (e) {
        showToast(`Could not update priority: ${e.message}`, 'error');
        renderComments(); // revert the <select> to the last known value
      }
    })();
  }

  async function attemptResolve(commentId, resolved, passphrase) {
    try {
      const updated = await apiResolveComment(diagramId, commentId, resolved, passphrase);
      applyCommentUpdate(updated);
      renderComments();
      renderDots();
      showToast(resolved ? 'Comment resolved.' : 'Comment reopened.', 'success');
    } catch (e) {
      if (isAuthError(e)) clearCachedPassphrase();
      showToast(`Could not update comment: ${e.message}`, 'error');
    }
  }

  async function attemptDeleteComment(commentId, passphrase) {
    try {
      await apiDeleteComment(diagramId, commentId, passphrase);
      comments = comments.filter((c) => c.id !== commentId);
      renderComments();
      renderDots();
      showToast('Comment deleted.', 'success');
    } catch (e) {
      if (isAuthError(e)) clearCachedPassphrase();
      showToast(`Could not delete comment: ${e.message}`, 'error');
    }
  }

  showResolvedCheckbox.addEventListener('change', () => {
    showResolved = showResolvedCheckbox.checked;
    renderComments();
  });

  // ── Comments panel show/hide ──────────────────────────────────────────

  function setCommentsPanelVisible(visible) {
    commentsPanelVisible = visible;
    commentsPanel.classList.toggle('collapsed', !visible);
    setTimeout(renderDots, 0); // layer size may have changed
  }

  commentsToggleBtn.addEventListener('click', () => setCommentsPanelVisible(!commentsPanelVisible));
  commentsPanelClose.addEventListener('click', () => setCommentsPanelVisible(false));

  // ── Pin placement ("Add Comment") ────────────────────────────────────

  function armCommentMode() {
    commentModeArmed = true;
    commentClickLayer.classList.add('armed');
    addCommentBtn.textContent = 'Cancel';
    addCommentBtn.classList.remove('btn-secondary');
    addCommentBtn.classList.add('btn-primary');
    showToast('Click a point on the diagram to place your comment.', 'info', 4000);
  }

  function disarmCommentMode() {
    commentModeArmed = false;
    commentClickLayer.classList.remove('armed');
    addCommentBtn.textContent = '+ Comment';
    addCommentBtn.classList.remove('btn-primary');
    addCommentBtn.classList.add('btn-secondary');
  }

  addCommentBtn.addEventListener('click', () => {
    if (commentModeArmed) { disarmCommentMode(); return; }
    if (!embed) { showToast('Diagram not ready yet.', 'error'); return; }
    armCommentMode();
  });

  function captureClickPoint(evt) {
    if (currentMode === 'view' && embed && embed.screenToGraphPoint) {
      return embed.screenToGraphPoint(evt.clientX, evt.clientY);
    }
    if (currentMode === 'edit' && embed && embed.getPageDimensions) {
      const rect = commentClickLayer.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return null;
      const dims = embed.getPageDimensions();
      const fx = (evt.clientX - rect.left) / rect.width;
      const fy = (evt.clientY - rect.top)  / rect.height;
      return { x: fx * dims.width, y: fy * dims.height };
    }
    return null;
  }

  commentClickLayer.addEventListener('click', (evt) => {
    if (!commentModeArmed) return;
    const point = captureClickPoint(evt);
    disarmCommentMode();
    if (!point) { showToast('Could not determine click position — try again.', 'error'); return; }
    openCommentComposer(point);
  });

  // ── Comment composer modal ────────────────────────────────────────────

  function openCommentComposer(point) {
    pendingCommentPoint = point;
    const cachedName = (currentUser && currentUser.name) || getCachedCommenterName();
    commentComposerNameRow.classList.toggle('hidden', !!cachedName);
    commentComposerName.value = (currentUser && currentUser.name) || '';
    commentComposerPriority.value = 'medium';
    commentComposerBody.value = '';
    commentComposerError.classList.add('hidden');
    commentComposerModal.classList.remove('hidden');
    setTimeout(() => (cachedName ? commentComposerBody : commentComposerName).focus(), 50);
  }

  function closeCommentComposer() {
    commentComposerModal.classList.add('hidden');
    pendingCommentPoint = null;
  }

  function showComposerError(message) {
    commentComposerError.textContent = message;
    commentComposerError.classList.remove('hidden');
  }

  commentComposerCancel.addEventListener('click', closeCommentComposer);
  commentComposerModal.addEventListener('click', (e) => {
    if (e.target === commentComposerModal) closeCommentComposer();
  });

  commentComposerSubmit.addEventListener('click', async () => {
    if (!pendingCommentPoint) { closeCommentComposer(); return; }
    const body = commentComposerBody.value.trim();
    if (!body) { showComposerError('Comment text is required.'); return; }

    let authorName = '';
    if (currentUser && currentUser.name) {
      authorName = currentUser.name;
    } else {
      const cachedName = getCachedCommenterName();
      authorName = cachedName;
      if (!authorName) {
        authorName = commentComposerName.value.trim();
        if (!authorName) { showComposerError('Name is required.'); return; }
      }
    }

    const priority = commentComposerPriority.value;
    const point = pendingCommentPoint;

    commentComposerSubmit.disabled = true;
    commentComposerError.classList.add('hidden');
    try {
      const resolved = resolveEditPassphrase(diagramId);
      const passphrase = resolved ? resolved.passphrase : '';
      const created = await apiCreateComment(diagramId, {
        x: point.x, y: point.y, priority, authorName, body,
      }, passphrase);
      if (!currentUser || !currentUser.name) {
        const cachedName = getCachedCommenterName();
        if (!cachedName) setCachedCommenterName(authorName);
      }
      applyCommentUpdate(created);
      closeCommentComposer();
      if (!commentsPanelVisible) {
        setCommentsPanelVisible(true);
      }
      renderComments();
      renderDots();
      showToast('Comment added.', 'success');
    } catch (e) {
      if (isAuthError(e)) {
        showComposerError('Passphrase required — click "+ Comment" again to unlock.');
      } else {
        showComposerError(e.message);
      }
    } finally {
      commentComposerSubmit.disabled = false;
    }
  });

  // ── Dot markers ───────────────────────────────────────────────────────

  function graphPointToLayerPoint(gx, gy) {
    const layerRect = commentDotsLayer.getBoundingClientRect();
    if (layerRect.width === 0 || layerRect.height === 0) return null;

    if (currentMode === 'view' && embed && embed.graphToScreenPoint) {
      const screen = embed.graphToScreenPoint(gx, gy);
      if (!screen) return null;
      return { x: screen.x - layerRect.left, y: screen.y - layerRect.top };
    }
    if (currentMode === 'edit' && embed && embed.getPageDimensions) {
      const dims = embed.getPageDimensions();
      if (!dims.width || !dims.height) return null;
      return {
        x: (gx / dims.width)  * layerRect.width,
        y: (gy / dims.height) * layerRect.height,
      };
    }
    return null;
  }

  function renderDots() {
    clearHover(); // dot elements are about to be replaced — drop any stale hover refs
    commentDotsLayer.innerHTML = '';
    if (!embed) return;
    comments
      .filter((c) => c.status !== 'resolved')
      .forEach((c) => {
        const pos = graphPointToLayerPoint(c.x, c.y);
        if (!pos) return;
        const dot = document.createElement('div');
        dot.className = `comment-dot priority-${c.priority}`;
        dot.style.left = `${pos.x}px`;
        dot.style.top  = `${pos.y}px`;
        dot.title = `${c.authorName}: ${c.body.slice(0, 80)}`;
        dot.addEventListener('click', () => {
          // A drag that just ended fires a synthetic click right after —
          // suppress that one so dragging doesn't also open the card.
          if (dot.dataset.dragged === '1') { delete dot.dataset.dragged; return; }
          highlightCommentCard(c.id);
        });
        dot.addEventListener('mouseenter', () => startDotHover(dot, c.id));
        dot.addEventListener('mouseleave', () => clearHover());
        // Dragging a dot to reposition it is only supported in view mode —
        // edit mode's coordinate math is an approximation (see
        // graphPointToLayerPoint) and doesn't have a reliable inverse.
        if (currentMode === 'view') {
          dot.classList.add('dot-draggable');
          dot.addEventListener('pointerdown', (evt) => startDotDrag(evt, dot, c));
        }
        commentDotsLayer.appendChild(dot);
      });
  }

  const DOT_DRAG_THRESHOLD_PX = 4;

  function startDotDrag(evt, dot, comment) {
    if (evt.button !== undefined && evt.button !== 0) return; // left-click / primary touch only
    evt.preventDefault();
    const startX = evt.clientX;
    const startY = evt.clientY;
    const startLeft = parseFloat(dot.style.left) || 0;
    const startTop  = parseFloat(dot.style.top)  || 0;
    let dragging = false;

    try { dot.setPointerCapture(evt.pointerId); } catch (_) { /* ignore */ }

    function onMove(moveEvt) {
      const dx = moveEvt.clientX - startX;
      const dy = moveEvt.clientY - startY;
      if (!dragging && Math.hypot(dx, dy) < DOT_DRAG_THRESHOLD_PX) return;
      dragging = true;
      dot.classList.add('dragging');
      clearHover();
      dot.style.left = `${startLeft + dx}px`;
      dot.style.top  = `${startTop + dy}px`;
    }

    function onUp(upEvt) {
      dot.removeEventListener('pointermove', onMove);
      dot.removeEventListener('pointerup', onUp);
      dot.removeEventListener('pointercancel', onCancel);
      dot.classList.remove('dragging');
      try { dot.releasePointerCapture(upEvt.pointerId); } catch (_) { /* ignore */ }

      if (!dragging) return; // it was just a click — the dot's own click handler runs normally
      dot.dataset.dragged = '1'; // suppress the click that follows a drag release

      if (!embed || !embed.screenToGraphPoint) { renderDots(); return; }
      const point = embed.screenToGraphPoint(upEvt.clientX, upEvt.clientY);
      if (!point) { renderDots(); return; }

      const resolved = resolveEditPassphrase(diagramId);
      const passphrase = resolved ? resolved.passphrase : '';
      persistDotMove(comment.id, point, passphrase);
    }

    function onCancel() {
      dot.removeEventListener('pointermove', onMove);
      dot.removeEventListener('pointerup', onUp);
      dot.removeEventListener('pointercancel', onCancel);
      dot.classList.remove('dragging');
      renderDots(); // snap back to the last known server position
    }

    dot.addEventListener('pointermove', onMove);
    dot.addEventListener('pointerup', onUp);
    dot.addEventListener('pointercancel', onCancel);
  }

  async function persistDotMove(commentId, point, passphrase) {
    try {
      const updated = await apiUpdateCommentPosition(diagramId, commentId, point.x, point.y, passphrase);
      applyCommentUpdate(updated);
      renderDots();
      showToast('Comment moved.', 'success');
    } catch (e) {
      if (isAuthError(e)) clearCachedPassphrase();
      showToast(`Could not move comment: ${e.message}`, 'error');
      renderDots(); // snap back to the last known server position
    }
  }

  function highlightCommentCard(commentId) {
    if (!commentsPanelVisible) setCommentsPanelVisible(true);
    const card = commentsList.querySelector(`[data-comment-id="${commentId}"]`);
    if (!card) return;
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    card.classList.add('flash');
    setTimeout(() => card.classList.remove('flash'), 1200);
  }

  window.addEventListener('resize', () => renderDots());

  // ── Hover: connect a dot to its comment card ──────────────────────────
  //
  // Hovering a dot highlights the matching card in the sidebar, auto-scrolls
  // it into view if it isn't already visible, and draws a dashed line from
  // the dot to the card for the duration of the hover. The line is redrawn
  // on every animation frame while active so it tracks smoothly during the
  // scroll-into-view animation and any subsequent pan/zoom/resize.

  let hoveredDot     = null;
  let hoveredCard    = null;
  let hoverLineFrame = null;

  function getHoverLineSvg() {
    let svg = document.getElementById('comment-hover-line-svg');
    if (!svg) {
      svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.id = 'comment-hover-line-svg';
      svg.setAttribute('class', 'comment-hover-line-svg');
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.id = 'comment-hover-line';
      svg.appendChild(line);
      document.body.appendChild(svg);
    }
    return svg;
  }

  function updateHoverLine() {
    if (!hoveredDot || !hoveredCard) return;
    const line = document.getElementById('comment-hover-line');
    const dotRect  = hoveredDot.getBoundingClientRect();
    const cardRect = hoveredCard.getBoundingClientRect();
    const listRect = commentsList.getBoundingClientRect();

    // Clip the card endpoint to the visible portion of the scrollable list
    // so the line doesn't fly off past the sidebar's clipped edges while a
    // scroll-into-view animation is still in progress.
    const visibleTop    = Math.max(cardRect.top, listRect.top);
    const visibleBottom = Math.min(cardRect.bottom, listRect.bottom);
    if (visibleBottom <= visibleTop) {
      // Card is fully scrolled out of view — hide the line until it appears.
      line.setAttribute('stroke-opacity', '0');
    } else {
      line.setAttribute('stroke-opacity', '1');
      const x1 = dotRect.left + dotRect.width / 2;
      const y1 = dotRect.top + dotRect.height / 2;
      const x2 = cardRect.left;
      const y2 = (visibleTop + visibleBottom) / 2;
      line.setAttribute('x1', x1);
      line.setAttribute('y1', y1);
      line.setAttribute('x2', x2);
      line.setAttribute('y2', y2);
    }
    hoverLineFrame = requestAnimationFrame(updateHoverLine);
  }

  function startDotHover(dot, commentId) {
    if (!commentsPanelVisible) return; // nothing visible to connect/highlight
    const card = commentsList.querySelector(`[data-comment-id="${commentId}"]`);
    if (!card) return;

    clearHover();
    hoveredDot  = dot;
    hoveredCard = card;
    dot.classList.add('hover-active');
    card.classList.add('hover-highlight');

    const cardRect = card.getBoundingClientRect();
    const listRect = commentsList.getBoundingClientRect();
    const outOfView = cardRect.top < listRect.top || cardRect.bottom > listRect.bottom;
    if (outOfView) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    getHoverLineSvg().classList.add('visible');
    updateHoverLine();
  }

  function clearHover() {
    if (hoverLineFrame) { cancelAnimationFrame(hoverLineFrame); hoverLineFrame = null; }
    if (hoveredDot)  hoveredDot.classList.remove('hover-active');
    if (hoveredCard) hoveredCard.classList.remove('hover-highlight');
    hoveredDot  = null;
    hoveredCard = null;
    const svg = document.getElementById('comment-hover-line-svg');
    if (svg) svg.classList.remove('visible');
  }

  // ── SSO & Session Checking ────────────────────────────────────────────────
  let currentUser = null;
  let oidcAvailable = false;

  async function checkAuth() {
    try {
      const res = await fetch('/api/auth/me');
      if (res.ok) {
        const data = await res.json();
        currentUser = data.user;
        oidcAvailable = data.oidcAvailable;
        updateAuthUI();
      }
    } catch (e) {
      console.error('Failed to fetch auth state', e);
    }
  }

  function updateAuthUI() {
    const authControls = document.getElementById('auth-controls');
    if (authControls) {
      authControls.innerHTML = '';
      if (currentUser && currentUser.name) {
        const pill = document.createElement('div');
        pill.className = 'identity-pill';
        pill.innerHTML = `
          <span class="user-name">${escapeHtml(currentUser.name)}</span>
          <span class="user-email" style="opacity: 0.7; font-size: 0.9em; border-left: 1px solid var(--color-border); padding-left: 8px; margin-left: 2px;">${escapeHtml(currentUser.email || '')}</span>
          <span class="user-role" style="font-size: 0.85em; background: rgba(0,0,0,0.06); padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: 500; margin-left: 2px;">${escapeHtml(currentUser.role || '')}</span>
          <button class="logout-btn" id="sso-logout-btn" title="Log out">✕</button>
        `;
        authControls.appendChild(pill);
        
        const logoutBtn = pill.querySelector('#sso-logout-btn');
        logoutBtn.addEventListener('click', async () => {
          try {
            const res = await fetch('/api/auth/logout', { method: 'POST' });
            if (res.ok) {
              clearCachedPassphrase();
              location.reload();
            }
          } catch (e) {
            showToast('Failed to log out.', 'error');
          }
        });
      } else if (oidcAvailable) {
        const loginBtn = document.createElement('a');
        loginBtn.href = `/api/auth/sso/start?return_url=${encodeURIComponent(window.location.pathname)}`;
        loginBtn.className = 'btn btn-secondary btn-sm sso-login-btn';
        loginBtn.textContent = 'Login';
        authControls.appendChild(loginBtn);
      }
    }
  }

  // ── Bootstrap ────────────────────────────────────────────────────────────

  // Start in view mode unless mode=edit is requested and we have credentials/role
  checkAuth().then(() => {
    const urlParams = new URLSearchParams(window.location.search);
    const modeParam = urlParams.get('mode');
    const hasSsoEditAccess = currentUser && (currentUser.role === 'admin' || currentUser.role === 'editor');
    const resolved = resolveEditPassphrase(diagramId);

    if (modeParam === 'edit' && (hasSsoEditAccess || resolved)) {
      if (hasSsoEditAccess) {
        initEdit('', 'sso');
      } else {
        initEdit(resolved.passphrase, resolved.source);
      }
    } else {
      initView();
    }
    loadComments();
  });
</script>
</body>
</html>
